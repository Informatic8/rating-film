<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistem Rating Film - OMDb</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Plus Jakarta Sans", "ui-sans-serif", "system-ui"],
            },
          },
        },
      };
    </script>
  </head>
  <body class="min-h-screen bg-slate-950 font-sans text-slate-100">
    <!-- Latar dekoratif efek glow -->
    <div class="pointer-events-none fixed inset-0 -z-10 overflow-hidden">
      <div class="absolute -left-20 -top-24 h-72 w-72 rounded-full bg-cyan-500/30 blur-3xl"></div>
      <div class="absolute right-0 top-20 h-80 w-80 rounded-full bg-indigo-500/30 blur-3xl"></div>
      <div class="absolute bottom-0 left-1/3 h-72 w-72 rounded-full bg-fuchsia-500/20 blur-3xl"></div>
    </div>

    <!-- Konten utama -->
    <main class="mx-auto max-w-6xl px-4 py-8 md:py-10">
      <!-- Bagian header halaman -->
      <header class="mb-8 rounded-3xl border border-white/10 bg-white/10 p-6 shadow-2xl backdrop-blur md:p-8">
        <div class="flex items-center gap-3">
          <div class="rounded-xl bg-cyan-400/20 p-2 text-cyan-300">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" fill="currentColor">
              <path d="M4 5a3 3 0 0 1 3-3h10a3 3 0 0 1 3 3v14a1 1 0 0 1-1.707.707L12 13.414l-6.293 6.293A1 1 0 0 1 4 19V5z" />
            </svg>
          </div>
          <h1 class="text-2xl font-extrabold tracking-tight md:text-3xl">Film Explorer</h1>
        </div>
        <p class="mt-3 text-sm text-slate-300">
          Jelajahi film yang kamu suka dari OMDb, lihat detail film kesukaanmu.
        </p>
      </header>

      <!-- Aksi pencarian + export -->
      <section class="mb-6 rounded-3xl border border-white/10 bg-white/10 p-5 shadow-xl backdrop-blur md:p-6">
        <h2 class="mb-3 text-lg font-semibold text-white">Cari Film</h2>
        <div class="relative z-[70] flex flex-col gap-3 md:flex-row">
          <input
            id="searchInput"
            type="text"
            placeholder="Ketik judul film..."
            class="w-full rounded-2xl border border-white/15 bg-slate-900/60 px-4 py-3 text-slate-100 placeholder:text-slate-400 outline-none ring-cyan-400/40 transition focus:ring"
          />
          <button
            id="searchBtn"
            class="rounded-2xl bg-cyan-500 px-5 py-3 font-semibold text-slate-950 transition hover:bg-cyan-400"
          >
            Cari
          </button>
          <button
            id="exportCsvBtn"
            class="rounded-2xl bg-white/15 px-5 py-3 font-semibold text-white transition hover:bg-white/25"
          >
            Export CSV
          </button>
        </div>
        <p id="searchMessage" class="mt-3 text-sm text-slate-300"></p>
      </section>

      <!-- Wadah kartu film -->
      <section class="mb-6">
        <div id="results" class="grid grid-cols-1 gap-4 md:grid-cols-2 lg:grid-cols-3"></div>
      </section>
    </main>

    <!-- Modal detail film -->
    <div
      id="movieModal"
      class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-950/80 p-4 backdrop-blur-sm"
      aria-hidden="true"
    >
      <div class="w-full max-w-3xl rounded-3xl border border-white/15 bg-slate-900/95 shadow-2xl">
        <div class="flex items-center justify-between border-b border-white/10 px-5 py-4">
          <h3 id="modalTitle" class="text-lg font-semibold text-white">Detail Film</h3>
          <button
            id="closeModalBtn"
            class="rounded-xl bg-white/10 px-3 py-1.5 text-sm font-semibold text-slate-200 transition hover:bg-white/20"
          >
            Tutup
          </button>
        </div>
        <div id="modalContent" class="p-5 text-sm text-slate-200">
          Memuat detail film...
        </div>
      </div>
    </div>

    <!-- Modal konfirmasi export (tetap 500 baris) -->
    <div
      id="exportModal"
      class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-950/80 p-4 backdrop-blur-sm"
      aria-hidden="true"
    >
      <div class="w-full max-w-md rounded-3xl border border-white/15 bg-slate-900/95 shadow-2xl">
        <div class="flex items-center justify-between border-b border-white/10 px-5 py-4">
          <h3 class="text-lg font-semibold text-white">Export CSV</h3>
          <button
            id="closeExportModalBtn"
            class="rounded-xl bg-white/10 px-3 py-1.5 text-sm font-semibold text-slate-200 transition hover:bg-white/20"
          >
            Tutup
          </button>
        </div>
        <div class="space-y-4 p-5">
          <p class="text-sm text-slate-300">
            Export akan mengambil <strong>500 data film</strong> (fixed) sesuai hasil pencarian/random saat ini.
          </p>
          <div class="flex gap-2">
            <button
              id="confirmExportBtn"
              class="w-full rounded-xl bg-cyan-500 px-3 py-2 text-sm font-semibold text-slate-950 transition hover:bg-cyan-400"
            >
              Export
            </button>
            <button
              id="cancelExportBtn"
              class="w-full rounded-xl bg-white/10 px-3 py-2 text-sm font-semibold text-slate-200 transition hover:bg-white/20"
            >
              Batal
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
